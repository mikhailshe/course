<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIBIL — Заявка отправлена</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Manrope', sans-serif;
            background-color: #fcfcfd;
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            position: relative;
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .blob {
            position: fixed;
            width: 520px;
            height: 520px;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: -1;
        }
        .blob-1 {
            top: -140px;
            left: -160px;
            background: linear-gradient(135deg, rgba(56, 211, 159, 0.18), transparent);
        }
        .blob-2 {
            right: -160px;
            bottom: -100px;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), transparent);
        }

        .card {
            max-width: 520px;
            width: 100%;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 30px;
            padding: 2.5rem 2rem;
            box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
            text-align: center;
        }

        @media (min-width: 640px) {
            .card { padding: 3rem 2.5rem; }
        }

        .logo {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -0.05em;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            margin-bottom: 2rem;
        }

        .logo-dot {
            width: 10px;
            height: 10px;
            background-color: #38d39f;
            border-radius: 50%;
        }

        .icon {
            width: 72px;
            height: 72px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            background-color: #ecfdf5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }

        h1 {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            line-height: 1.25;
            margin: 0 0 1rem;
        }

        @media (min-width: 640px) {
            h1 { font-size: 1.875rem; }
        }

        p {
            color: #64748b;
            font-size: 1rem;
            font-weight: 600;
            line-height: 1.625;
            margin: 0 0 2rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            border-radius: 16px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #0f172a;
            background: linear-gradient(90deg, #38d39f, #22c55e);
            box-shadow: 0 18px 36px rgba(56, 211, 159, 0.25);
            transition: filter 0.15s ease;
        }

        .btn:hover {
            filter: brightness(1.05);
        }
    </style>
</head>
<body>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="card">
        <a href="landing.html" class="logo">
            ZIBIL<span class="logo-dot"></span>
        </a>
        <div class="icon">✓</div>
        <h1>Заявка отправлена</h1>
        <p>Спасибо! Оператор свяжется с вами в ближайшее время, уточнит детали и подтвердит время выезда.</p>
        <a href="landing.html" class="btn">Вернуться на главную</a>
    </div>

</body>
</html>
