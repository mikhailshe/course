<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIBIL — вынос мусора и быстрый сервис для дома и бизнеса</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Manrope:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, ::before, ::after {
            box-sizing: border-box;
            border-width: 0;
            border-style: solid;
            border-color: #e2e8f0;
        }
        html {
            line-height: 1.5;
            -webkit-text-size-adjust: 100%;
            -moz-tab-size: 4;
            tab-size: 4;
            scroll-behavior: smooth;
        }
        body {
            margin: 0;
            line-height: inherit;
            font-family: 'Manrope', sans-serif;
            background-color: #fcfcfd;
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        a {
            color: inherit;
            text-decoration: inherit;
        }
        button, input, optgroup, select, textarea {
            font-family: inherit;
            font-size: 100%;
            font-weight: inherit;
            line-height: inherit;
            color: inherit;
            margin: 0;
            padding: 0;
        }
        ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }
        img, svg {
            display: block;
            vertical-align: middle;
        }
        img {
            max-width: 100%;
            height: auto;
        }

        :root {
            --brand-green: #38d39f;
            --brand-green-dark: #22c55e;
            --brand-dark: #0f172a;
            --brand-muted: #64748b;
            --brand-line: #e2e8f0;
            --brand-soft: #f8fafc;
            --brand-light: #fcfcfd;
            --font-unbounded: 'Unbounded', sans-serif;
            --font-manrope: 'Manrope', sans-serif;
            --shadow-main: 0 18px 36px rgba(56, 211, 159, 0.25);
            --shadow-card: 0 24px 60px rgba(15, 23, 42, 0.08);
            --shadow-overlay: 0 28px 80px rgba(15, 23, 42, 0.12);
        }

        .font-manrope { font-family: var(--font-manrope); }
        .font-unbounded { font-family: var(--font-unbounded); }

        .bg-brand-light { background-color: var(--brand-light); }
        .bg-brand-soft { background-color: var(--brand-soft); }
        .bg-brand-dark { background-color: var(--brand-dark); }
        .bg-brand-green { background-color: var(--brand-green); }
        .bg-white { background-color: #ffffff; }

        .text-brand-dark { color: var(--brand-dark); }
        .text-brand-muted { color: var(--brand-muted); }
        .text-brand-green { color: var(--brand-green); }

        .antialiased { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        .leading-relaxed { line-height: 1.625; }
        .overflow-x-hidden { overflow-x: hidden; }
        .pointer-events-none { pointer-events: none; }
        .absolute { position: absolute; }
        .z-\[-1\] { z-index: -1; }
        .rounded-full { border-radius: 9999px; }
        .top-\[-140px\] { top: -140px; }
        .left-\[-160px\] { left: -160px; }
        .right-\[-160px\] { right: -160px; }
        .top-\[220px\] { top: 220px; }
        .w-\[520px\] { width: 520px; }
        .h-\[520px\] { height: 520px; }
        .blur-\[100px\] { filter: blur(100px); }
        .bg-gradient-to-br.from-\[\#38d39f\]\/18.to-transparent {
            background-image: linear-gradient(135deg, rgba(56, 211, 159, 0.18) 0%, transparent 100%);
        }
        .bg-gradient-to-br.from-blue-500\/10.to-transparent {
            background-image: linear-gradient(135deg, rgba(59, 130, 246, 0.10) 0%, transparent 100%);
        }
    </style>
</head>
<body class="font-manrope bg-brand-light text-brand-dark antialiased leading-relaxed overflow-x-hidden">

    <div class="absolute pointer-events-none z-[-1] rounded-full top-[-140px] left-[-160px] w-[520px] h-[520px] blur-[100px] bg-gradient-to-br from-[#38d39f]/18 to-transparent"></div>
    <div class="absolute pointer-events-none z-[-1] rounded-full right-[-160px] top-[220px] w-[520px] h-[520px] blur-[100px] bg-gradient-to-br from-blue-500/10 to-transparent"></div>

</body>
</html>
