<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIBIL — Дашборд сервиса</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-green: #38d39f;
            --brand-green-dark: #22c55e;
            --brand-dark: #0f172a;
            --brand-muted: #64748b;
            --brand-line: #e2e8f0;
            --brand-soft: #f8fafc;
            --brand-light: #fcfcfd;
            --emerald-50: #ecfdf5;
            --emerald-100: #d1fae5;
            --blue-50: #eff6ff;
            --blue-500: #3b82f6;
            --shadow-brand-main: 0 18px 36px rgba(56, 211, 159, 0.25);
            --shadow-brand-card: 0 24px 60px rgba(15, 23, 42, 0.08);
            --shadow-brand-overlay: 0 28px 80px rgba(15, 23, 42, 0.12);
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--brand-light);
            color: var(--brand-dark);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            min-height: 100vh;
            position: relative;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        .ambient-blob {
            position: fixed;
            width: 520px;
            height: 520px;
            border-radius: 50%;
            filter: blur(100px);
            pointer-events: none;
            z-index: -10;
        }
        .blob-1 {
            top: -140px;
            left: -160px;
            background: linear-gradient(to bottom right, rgba(56, 211, 159, 0.12), transparent);
        }
        .blob-2 {
            right: -160px;
            bottom: -160px;
            background: linear-gradient(to bottom right, rgba(59, 130, 246, 0.08), transparent);
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 50;
            background-color: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(226, 232, 240, 0.7);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
        }
        @media (min-width: 640px) { .container { padding: 0 1.5rem; } }
        @media (min-width: 1024px) { .container { padding: 0 2rem; } }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
        }

        .logo {
            font-family: 'Unbounded', sans-serif;
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -0.05em;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .logo-dot {
            width: 10px;
            height: 10px;
            background-color: var(--brand-green);
            border-radius: 50%;
            display: inline-block;
        }

        .user-nav {
            display: none;
            align-items: center;
            gap: 1rem;
        }
        @media (min-width: 1024px) {
            .user-nav { display: flex; }
        }

        .user-info {
            text-align: right;
            border-right: 1px solid var(--brand-line);
            padding-right: 1.25rem;
        }

        .user-info-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 800;
            color: var(--brand-muted);
            margin-bottom: 2px;
        }

        .user-info-name {
            font-size: 14px;
            font-weight: 800;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--brand-soft);
            border: 1px solid var(--brand-line);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            user-select: none;
        }

        #menu-toggle { display: none; }
        .menu-btn {
            display: block;
            padding: 0.5rem;
            font-size: 1.5rem;
            cursor: pointer;
            user-select: none;
        }
        @media (min-width: 1024px) { .menu-btn { display: none; } }
        
        .menu-close { display: none; }

        #menu-toggle:checked ~ .header .menu-open { display: none; }
        #menu-toggle:checked ~ .header .menu-close { display: inline-block; }
        #menu-toggle:checked ~ #mobile-menu { display: block; }

        #mobile-menu {
            display: none;
            border-top: 1px solid var(--brand-line);
            background-color: white;
            padding: 1.5rem;
            box-shadow: var(--shadow-brand-card);
        }
        @media (min-width: 1024px) { #mobile-menu { display: none !important; } }

        .mobile-nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .nav-link-mobile {
            display: block;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: 0.2s ease;
        }
        .nav-link-mobile.active {
            background-color: var(--brand-dark);
            color: white;
        }
        .nav-link-mobile:not(.active) {
            color: var(--brand-muted);
        }
        .nav-link-mobile:not(.active):hover {
            background-color: var(--brand-soft);
        }

        main {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        @media (min-width: 1024px) {
            .layout-grid { grid-template-columns: 260px 1fr; }
        }

        aside { display: none; }
        @media (min-width: 1024px) { aside { display: block; } }

        .sticky-nav {
            position: sticky;
            top: 112px;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .nav-link {
            display: block;
            padding: 1rem 1.25rem;
            border-radius: 16px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: 0.2s ease;
        }
        .nav-link.active {
            background-color: var(--brand-dark);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(15, 23, 42, 0.1);
        }
        .nav-link:not(.active) {
            color: var(--brand-muted);
        }
        .nav-link:not(.active):hover {
            background-color: var(--brand-soft);
        }

        .nav-divider {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--brand-line);
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
    </style>
</head>
<body>
    
    <div class="ambient-blob blob-1"></div>
    <div class="ambient-blob blob-2"></div>

</body>
</html>
